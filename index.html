<div id="api-modal" class="fixed inset-0 bg-[#1e1918]/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-all duration-300">
        <div class="bg-white max-w-md w-full mx-4 rounded-3xl p-8 border border-[#e8dcd5] shadow-2xl relative">
            <h3 class="serif-font text-2xl font-bold text-[#1e1918] mb-2">Configure Pixabay Key</h3>
            <p class="text-xs text-[#5c4e4a] leading-relaxed mb-6">
                This website fetches beautiful plant images in real-time. To load these visuals, please provide your free Pixabay API key.
            </p>

            <div class="space-y-4 mb-8">
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-[#8c6254]">Pixabay API Key</label>
                        <a href="https://pixabay.com/api/docs/#api_key" target="_blank" class="text-[11px] text-[#8c6254] hover:underline font-semibold flex items-center gap-1">
                            <i class="fa-solid fa-circle-info"></i> Get Your Free Key
                        </a>
                    </div>
                    <input type="password" id="pixabay-key-input" placeholder="e.g. 8702637-eb66a576f..." class="w-full px-4 py-3 rounded-xl border border-[#e8dcd5] focus:border-[#8c6254] focus:outline-none text-sm bg-[#faf8f5]">
                    <span class="text-[10px] text-gray-400 mt-1 block">Your key will be securely saved locally in your browser cache.</span>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="saveApiKeys()" class="flex-1 bg-[#8c6254] hover:bg-[#1e1918] text-white py-3 rounded-xl text-sm font-semibold transition-all">Save Credentials</button>
                <button onclick="hideApiModal()" class="px-5 py-3 rounded-xl border border-[#e8dcd5] hover:bg-gray-50 text-sm font-semibold text-[#5c4e4a] transition-all">Cancel</button>
            </div>
        </div>
    </div>
